name: Retry lead notifications

# Every 5 minutes, hit the AMJ retry-notifications endpoint so leads whose
# primary sales email failed get retried and (after 15 min) alarmed.
#
# Setup (one time, in the repo Settings > Secrets and variables > Actions):
#   - AMJ_CRON_URL     https://www.amjingenieria.cl/api/cron/retry-notifications
#   - AMJ_CRON_SECRET  same value as the CRON_SECRET env var in Vercel
#                      (optional until CRON_SECRET is configured in Vercel —
#                      the endpoint accepts the GitHub-Actions UA as a fallback)

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Trigger retry cron
        env:
          URL: ${{ secrets.AMJ_CRON_URL }}
          SECRET: ${{ secrets.AMJ_CRON_SECRET }}
        run: |
          if [ -z "$URL" ]; then
            URL="https://www.amjingenieria.cl/api/cron/retry-notifications"
          fi
          echo "Calling $URL"
          if [ -n "$SECRET" ]; then
            RESP=$(curl -sS -w "\n__HTTP__%{http_code}" \
              -H "Authorization: Bearer $SECRET" \
              -H "User-Agent: GitHub-Actions amj-web/retry-lead-notifications" \
              "$URL")
          else
            RESP=$(curl -sS -w "\n__HTTP__%{http_code}" \
              -H "User-Agent: GitHub-Actions amj-web/retry-lead-notifications" \
              "$URL")
          fi
          BODY=$(printf '%s' "$RESP" | sed '$d')
          CODE=$(printf '%s' "$RESP" | tail -n1 | sed 's/__HTTP__//')
          echo "http=$CODE"
          echo "body=$BODY"
          if [ "$CODE" != "200" ]; then
            exit 1
          fi
